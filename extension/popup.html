<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=380, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>GitPulse</title>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="icons/icon48.png" alt="" width="24" height="24">
        <span>GitPulse</span>
      </div>
    </header>

    <div class="input-group">
      <label for="username">GitHub Username</label>
      <input type="text" id="username" placeholder="e.g. tarundattagondi" autocomplete="off">
    </div>

    <button id="score-btn" class="btn-primary">Score This Job</button>

    <div id="progress" class="hidden">
      <div class="step" data-step="1">
        <span class="icon"></span>
        <span class="label">Reading job description</span>
      </div>
      <div class="step" data-step="2">
        <span class="icon"></span>
        <span class="label">Fetching your GitHub profile</span>
      </div>
      <div class="step" data-step="3">
        <span class="icon"></span>
        <span class="label">Analyzing job requirements</span>
      </div>
      <div class="step" data-step="4">
        <span class="icon"></span>
        <span class="label">Matching profile to role</span>
      </div>
      <div class="step" data-step="5">
        <span class="icon"></span>
        <span class="label">Generating recommendations</span>
      </div>
      <p class="hint">This usually takes 20-40 seconds</p>
    </div>

    <div id="error-box" class="hidden"></div>

    <div id="result" class="hidden">
      <div class="score-display"></div>
      <div class="score-subtitle">match score</div>
      <div class="summary"></div>

      <div id="breakdown" class="breakdown"></div>

      <div id="gaps" class="section hidden">
        <h3>Key Gaps</h3>
        <ul id="gapList"></ul>
      </div>

      <div id="strengths" class="section hidden">
        <h3>Strengths</h3>
        <ul id="strengthList"></ul>
      </div>

      <button id="view-full" class="btn-secondary">View full report</button>
    </div>

    <div class="footer">
      <a href="https://github.com/tarundattagondi/GitPulse" target="_blank">GitPulse on GitHub</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
